keynotes:
  title: "Keynote speakers"
  members:
    - name: "Sergey Ovchinnikov"
      affiliation: "MIT"
      photo: "img/people/sergey-ovchinnikov.jpg"
      bio: "MIT Department of Biology. His research develops deep learning methods for protein structure prediction and design, contributing to widely used tools such as ColabFold and modern approaches to evolutionary protein modeling."
    - name: "G.V. Shivashankar"
      affiliation: "ETH Zurich · Paul Scherrer Institute"
      photo: "img/people/gv-shivashankar.jpg"
      bio: "ETH Zurich and the Paul Scherrer Institute. His group studies how mechanical forces on the cell nucleus regulate chromatin organization and gene expression, linking mechanobiology to cell fate decisions."
    - name: "Caroline Uhler"
      affiliation: "Broad Institute · MIT"
      photo: "img/people/caroline-uhler.jpg"
      bio: "Professor at MIT and Co-Director of the Eric and Wendy Schmidt Center at the Broad Institute. Her research bridges statistics, machine learning, and biology, with a focus on causal inference for gene regulation and single-cell analysis."
    - name: "Marc Vidal"
      affiliation: "Dana-Farber Cancer Institute · Harvard Medical School"
      photo: "img/people/marc-vidal.jpg"
      bio: "Professor of Genetics at Harvard Medical School and Founding Director of the Center for Cancer Systems Biology (CCSB) at Dana-Farber Cancer Institute. His group pioneered systems-scale mapping of the human protein–protein interactome to understand how mutations perturb networks in disease."

invited:
  title: "Invited speakers"
  members:
    - name: "Alex Lu"
      affiliation: "Microsoft Research New England"
      photo: "img/people/alex-lu.jpg"
      bio: "Senior Researcher at Microsoft Research New England. His work explores how machine learning — particularly self-supervised methods — can extract new biological insights from cellular imaging and molecular data."
    - name: "Sahin Naqvi"
      affiliation: "Boston Children's Hospital · Harvard Medical School"
      photo: "img/people/sahin-naqvi.jpg"
      bio: "Assistant Professor in the Division of Gastroenterology at Boston Children's Hospital and the Department of Pediatrics at Harvard Medical School. His lab uses quantitative approaches to study transcription factor function and developmental gene regulatory programs."
    - name: "Armita Nourmohammad"
      affiliation: "Yale University"
      photo: "img/people/armita-nourmohammad.jpg"
      bio: "Yale University, working at the interface of physics, evolution, and immunology. Her group develops theoretical and computational models of how immune repertoires adapt in response to pathogens and disease."
    - name: "Yuri Pritykin"
      affiliation: "Princeton University"
      photo: "img/people/yuri-pritykin.jpg"
      bio: "Princeton University, in the Department of Computer Science and the Lewis-Sigler Institute for Integrative Genomics. His group develops computational methods for single-cell and spatial genomics to study immune cell function in cancer and infection."
    - name: "Rong Ma"
      affiliation: "Harvard T.H. Chan School of Public Health"
      photo: "img/people/rong-ma.jpg"
      bio: "Department of Biostatistics at the Harvard T.H. Chan School of Public Health. She develops statistical methods for high-dimensional inference and dimension reduction, with applications to single-cell genomics and computational biology."
